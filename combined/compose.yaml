services:
  # Home Assistant MCP Server Bridge
  ha-mcp:
    image: ghcr.io/homeassistant-ai/ha-mcp:latest
    container_name: ha-mcp
    restart: unless-stopped
    network_mode: host
    environment:
      - HOMEASSISTANT_URL=http://127.0.0.1:8123
      - HOMEASSISTANT_TOKEN=${HA_LONG_LIVED_ACCESS_TOKEN}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        
  redis:
    image: docker.io/library/redis:7
    container_name: paperless-redis
    restart: unless-stopped
    networks:
      - proxy
    deploy:
      resources:
        limits:
          memory: 256M

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: unless-stopped
    depends_on:
      - redis
      - db
    networks:
      - proxy
      - mariadb
    volumes:
      - ${PAPERLESS_DATA_PATH}:/usr/src/paperless/data
      - ${PAPERLESS_MEDIA_PATH}:/usr/src/paperless/media
      - ${PAPERLESS_EXPORT_PATH}:/usr/src/paperless/export
      - ${PAPERLESS_CONSUME_PATH}:/usr/src/paperless/consume
    environment:
      - PAPERLESS_REDIS=redis://paperless-redis:6379
      - PAPERLESS_DBHOST=mariadb
      - PAPERLESS_DBPORT=3306
      - PAPERLESS_DBENGINE=mariadb
      - PAPERLESS_DBNAME=${PAPERLESS_DB_NAME}
      - PAPERLESS_DBUSER=${PAPERLESS_DB_USER}
      - PAPERLESS_DBPASS=${PAPERLESS_DB_PWD} # Or a specific user pass
      - PAPERLESS_URL=https://paperless.damandan.nl
      - PAPERLESS_CSRF_TRUSTED_ORIGINS=https://paperless.damandan.nl
      - PAPERLESS_TIME_ZONE=Europe/Amsterdam
      - PAPERLESS_OCR_LANGUAGE=${PAPERLESS_OCR_LANGUAGE}
      - PAPERLESS_OCR_LANGUAGES=${PAPERLESS_OCR_LANGUAGES}
      - USER_ID=1000 # Match your preferred PUID
      - GROUP_ID=100  # Match your PGID
      - PAPERLESS_GMAIL_OAUTH_CLIENT_ID=${PAPERLESS_GMAIL_CLIENT}
      - PAPERLESS_GMAIL_OAUTH_CLIENT_SECRET=${PAPERLESS_GMAIL_SECRET}
    ports:
      - "8010:8000"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
  
  glances:
    image: nicolargo/glances:ubuntu-latest-full
    pid: host
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /run/user/1000/podman/podman.sock:/run/user/1000/podman/podman.sock
    environment:
      - "GLANCES_OPT=-w"
    # For nvidia GPUs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
  
  open-webui: 
    image: ghcr.io/open-webui/open-webui:latest-cuda126
    container_name: open-webui 
    ports: 
      - "3000:8080" 
    volumes: 
      - open-webui:/app/backend/data 
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          devices: 
            - capabilities: [gpu] 
    environment:
      - 'OLLAMA_BASE_URL=http://192.168.1.253:11434'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
  
  tvheadend:
    container_name: tvheadend
    image: linuxserver/tvheadend:latest
    restart: unless-stopped
    network_mode: host
    privileged: true
    runtime: nvidia
    environment:
      - PUID=1008
      - PGID=100
      - TZ=Europe/Amsterdam
    volumes:
      - "${TVHEADEND_RECORDINGS_PATH}:/recordings"
      - "${TVHEADEND_CONFIG_PATH}:/config"
      - ${PLEX_EPG_FILE_PATH}:/config/data/xmltv.xml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    stop_signal: SIGTERM
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  oscam:
    container_name: oscam
    image: linuxserver/oscam:latest
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - PUID=1010
      - PGID=100
      - TZ=Europe/Amsterdam
    ports:
      - "8888:8888"
      - "15050:15050"
      - "9090:9090"
    group_add:
      - dialout
    devices:
      - ${SMARGO_DEVICE_PATH}:/dev/ttyUSBSC
      - ${USB_BUS_PATH}:/dev/bus/usb
    volumes:
      - "${OSCAM_CONFIG_PATH}:/config"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'

  frigate:
    container_name: frigate
    image: ghcr.io/blakeblackshear/frigate:0.17.0
    restart: unless-stopped
    privileged: true
    shm_size: "1G"
    networks:
      - proxy
    devices:
      - ${USB_BUS_PATH}:/dev/bus/usb
    volumes:
      - ${LOCALTIME_PATH}:/etc/localtime:ro
      - ${FRIGATE_CONFIG_PATH}:/config
      - ${FRIGATE_MEDIA_PATH}:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    ports:
      - "10005:5000" # Internal unauthenticated access. Expose carefully.
      - "8554:8554" # RTSP feeds
      - "8555:8555/tcp" # WebRTC over tcp
      - "8555:8555/udp" # WebRTC over udp
      - "8971:8971"
      - "1984:1984"
    group_add:
      - "44"  # GID for video group
    device_cgroup_rules:
      - 'c 189:* rmw'
    environment:
      FRIGATE_MQTT_USER: ${FRIGATE_MQTT_USER}
      FRIGATE_MQTT_PASSWORD: ${FRIGATE_MQTT_PASSWORD}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    cap_add:
      - CAP_PERFMON
    deploy:
      resources:
        reservations:
          cpus: '4.0'
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 5G
  
  traefik:
    image: traefik:v3.6.7
    container_name: traefik
    restart: always
    networks:
      - proxy
      - default
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DOCKER_SOCKET_PATH}:/var/run/docker.sock
      - ${TRAEFIK_STATIC_CONFIG_PATH}:/etc/traefik/traefik.yaml:ro
      - ${TRAEFIK_DYNAMIC_CONFIG_PATH}:/etc/traefik/dynamic.yaml:ro
      - ${TRAEFIK_ACME_PATH}:/letsencrypt/acme.json
      - ${TRAEFIK_TRANSIP_PATH}:/transip
    labels:
      - "traefik.enable=false"
    environment:
      - TRANSIP_ACCOUNT_NAME=${TRANSIP_ACCOUNT_NAME}
      - TRANSIP_PRIVATE_KEY_PATH=${TRANSIP_PRIVATE_KEY_PATH}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    depends_on:
      - db
    volumes:
      - ${HOMEASSISTANT_CONFIG_PATH}:/config
      - ${LOCALTIME_PATH}:/etc/localtime:ro
      - ${DBUS_PATH}:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    security_opt:
      - seccomp=unconfined
    network_mode: host
    devices:
      - /dev/pyBat:/dev/pyBat
    environment:
      TZ: Europe/Amsterdam
    stop_signal: SIGTERM
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 3G

  matter-server:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: matter-server
    user: 1000:100
    restart: unless-stopped
    network_mode: host
    security_opt:
      - apparmor:unconfined
    volumes:
      - ${MATTER_SERVER_DATA_PATH}:/data/
      - ${DBUS_PATH}:/run/dbus:ro
    stop_signal: SIGTERM
    stop_grace_period: 30s

  modbus-proxy:
    image: tiagocoutinho/modbus-proxy
    container_name: modbus-proxy
    restart: always
    ports:
      - "5020:502"
    volumes:
      - ${MODBUS_PROXY_CONFIG_PATH}:/etc/modbus-proxy.yml
    stop_signal: SIGINT
    stop_grace_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
        reservations:
          cpus: '0.05'

  db:
    image: mariadb:latest
    container_name: mariadb
    user: "1001:100"
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - ${MARIADB_DATA_PATH}:/var/lib/mysql
      - ${MARIADB_CUSTOM_CNF_PATH}:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "3306:3306"
    networks:
      - mariadb
    security_opt:
      - seccomp=unconfined
    stop_signal: SIGTERM
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          cpus: '6.0'
          memory: 700M
        reservations:
          cpus: '3.0'
          memory: 700M

  adminer:
    image: adminer
    user: 1001:100
    container_name: adminer
    restart: "no"
    ports:
      - 8080:8080
    networks:
      - proxy
      - mariadb
    stop_signal: SIGTERM
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
        reservations:
          cpus: '0.05'

  spotweb:
    image: jgeusebroek/spotweb:dev
    container_name: spotweb
    depends_on:
      - db
    environment:
      - PUID=1009
      - PGID=100
      - TZ=Europe/Amsterdam
      - SPOTWEB_DB_TYPE=pdo_mysql
      - SPOTWEB_DB_HOST=${SPOTWEB_DB_HOST}
      - SPOTWEB_DB_PORT=${SPOTWEB_DB_PORT}
      - SPOTWEB_DB_NAME=${SPOTWEB_DB_NAME}
      - SPOTWEB_DB_USER=${SPOTWEB_DB_USER}
      - SPOTWEB_DB_PASS=${SPOTWEB_DB_PASS}
      - SPOTWEB_CRON_RETRIEVE=*/15 * * * *
      - SPOTWEB_CRON_CACHE_CHECK=10 */1 * * *
    ports:
      - 10006:80
    networks:
      - proxy
    volumes:
      - ${SPOTWEB_CONFIG_PATH}:/config
    tty: true
    stdin_open: true
    stop_signal: SIGTERM
    stop_grace_period: 1m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'

  sonarr-danny:
    container_name: sonarr-danny
    image: ghcr.io/linuxserver/sonarr
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - sabnzbd-danny
    environment:
      - PUID=1005
      - PGID=100
      - TZ=Europe/Amsterdam
      - UMASK_SET=022
    volumes:
      - ${SONARR_CONFIG_PATH}:/config
      - ${DANNY_SERIES_PATH}:/tv
      - ${DANNY_DOWNLOADS_COMPLETED_PATH}:/downloads
    ports:
      - 10002:8989
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  bazarr-danny:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr-danny
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - radarr-danny
      - sonarr-danny
    environment:
      - PUID=1007
      - PGID=100
      - TZ=Etc/UTC
    volumes:
      - ${DANNY_BAZARR_CONFIG_PATH}:/config
      - ${DANNY_MOVIES_PATH}:/movies
      - ${DANNY_SERIES_PATH}:/tv
    ports:
      - 10003:6767
    stop_signal: SIGTERM
    stop_grace_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  radarr-danny:
    image: ghcr.io/linuxserver/radarr
    container_name: radarr-danny
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - sabnzbd-danny
    environment:
      - PUID=1004
      - PGID=100
      - TZ=Europe/Amsterdam
      - UMASK_SET=022
    volumes:
      - ${DANNY_RADARR_CONFIG_PATH}:/config
      - ${DANNY_MOVIES_PATH}:/movies
      - ${DANNY_DOWNLOADS_COMPLETED_PATH}:/downloads
    ports:
      - 10001:7878
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
  
  sabnzbd-danny:
    image: ghcr.io/linuxserver/sabnzbd
    container_name: sabnzbd-danny
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - PUID=1006
      - PGID=100
      - TZ=Europe/Amsterdam
    volumes:
      - ${DANNY_SABNZBD_CONFIG_PATH}:/config
      - ${DANNY_DOWNLOADS_COMPLETED_PATH}:/config/Downloads/complete
      - ${DANNY_DOWNLOADS_INCOMPLETE_PATH}:/config/Downloads/incomplete
    ports:
      - 10004:9090
    stop_signal: SIGTERM
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
  
  bazarr-marlie:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr-marlie
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - radarr-marlie
    environment:
      - PUID=1007
      - PGID=100
      - TZ=Etc/UTC
    volumes:
      - ${MARLIE_BAZARR_CONFIG_PATH}:/config
      - ${MARLIE_MOVIES_PATH}:/movies
    ports:
      - 20003:6767
    stop_signal: SIGTERM
    stop_grace_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
  
  radarr-marlie:
    image: ghcr.io/linuxserver/radarr
    container_name: radarr-marlie
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - sabnzbd-danny
    environment:
      - PUID=1004
      - PGID=100
      - TZ=Europe/Amsterdam
      - UMASK_SET=022
    volumes:
      - ${MARLIE_RADARR_CONFIG_PATH}:/config
      - ${MARLIE_MOVIES_PATH}:/movies
      - ${MARLIE_DOWNLOADS_COMPLETED_PATH}:/downloads
    ports:
      - 20001:7878
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
  
  sabnzbd-marlie:
    image: ghcr.io/linuxserver/sabnzbd
    container_name: sabnzbd-marlie
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - PUID=1006
      - PGID=100
      - TZ=Europe/Amsterdam
    volumes:
      - ${MARLIE_SABNZBD_CONFIG_PATH}:/config
      - ${MARLIE_DOWNLOADS_COMPLETED_PATH}:/config/Downloads/complete
      - ${MARLIE_DOWNLOADS_INCOMPLETE_PATH}:/config/Downloads/incomplete
    ports:
      - 20004:9090
    stop_signal: SIGTERM
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
  
  #plex:
  #  image: plexinc/pms-docker:plexpass
  #  container_name: plex
  #  restart: unless-stopped
  #  network_mode: host
  #  runtime: nvidia
  #  env_file: .env
  #  environment:
  #    - PLEX_UID=1003
  #    - PLEX_GID=100
  #    - TZ=Europe/Amsterdam
  #    - PLEX_CLAIM=${PLEX_CLAIM}
  #    - ADVERTISE_IP=${ADVERTISE_IP}
  #    - HOSTNAME=${PLEX_HOSTNAME}
  #    - NVIDIA_VISIBLE_DEVICES=all
  #    - NVIDIA_DRIVER_CAPABILITIES=all
  #  stop_signal: SIGTERM
  #  stop_grace_period: 60s
  #  deploy:
  #    resources:
  #      limits:
  #        cpus: '4.0'
  #        memory: 1G
  #      reservations:
  #        memory: 128M
  #  volumes:
  #    - ${PLEX_CONFIG_PATH}:/config
  #    - ${PLEX_MULTIMEDIA_PATH}:/multimedia
  #    - ${PLEX_EPG_FILE_PATH}:/epg/ziggogo.xml
  #    - ${PLEX_TRANSCODE_PATH}:/transcode
  #    - ${DANNY_SERIES_PATH}:/tv
  #    - ${DANNY_MOVIES_PATH}:/movies
  #    - ${DANNY_MOVIES_2_PATH}:/movies2
  #    - ${MUSIC_PATH}:/music
  
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    # Optional - specify the uid and gid you would like Jellyfin to use instead of root
    user: 1003:100
    ports:
      - 10012:8096
    networks:
      - proxy
    volumes:
      - ${JELLYFIN_CONFIG_PATH}:/config
      - ${JELLYFIN_CACHE_PATH}:/cache
      - ${PLEX_EPG_FILE_PATH}:/epg/ziggogo.xml
      - type: bind
        source: ${DANNY_SERIES_PATH}
        target: /tv
      - type: bind
        source: ${DANNY_MOVIES_PATH}
        target: /movies
        read_only: true
      - type: bind
        source: ${DANNY_MOVIES_2_PATH}
        target: /movies2
        read_only: true
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - JELLYFIN_PublishedServerUrl=https://jellyfin.damandan.nl
    restart: 'unless-stopped'
    runtime: nvidia
    # Optional - may be necessary for docker healthcheck to pass if running in host network mode
    extra_hosts:
      - 'host.docker.internal:host-gateway'
  
  steam-headless:
    image: josh5/steam-headless
    container_name: steam-headless
    restart: unless-stopped
    privileged: true
    shm_size: ${SHM_SIZE}
    ipc: host
    network_mode: host
    hostname: ${STEAM_HOSTNAME}
    extra_hosts:
      - "${STEAM_HOSTNAME}:127.0.0.1"
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_NICE
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    runtime: nvidia
    environment:
      - TZ=${TZ}
      - USER_LOCALES=${USER_LOCALES}
      - DISPLAY=${DISPLAY}
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - USER_PASSWORD=${USER_PASSWORD}
      - MODE=${MODE}
      - WEB_UI_MODE=${WEB_UI_MODE}
      - ENABLE_VNC_AUDIO=${ENABLE_VNC_AUDIO}
      - PORT_NOVNC_WEB=${PORT_NOVNC_WEB}
      - NEKO_NAT1TO1=${NEKO_NAT1TO1}
      - ENABLE_STEAM=${ENABLE_STEAM}
      - STEAM_ARGS=${STEAM_ARGS}
      - ENABLE_SUNSHINE=${ENABLE_SUNSHINE}
      - SUNSHINE_USER=${SUNSHINE_USER}
      - SUNSHINE_PASS=${SUNSHINE_PASS}
      - ENABLE_EVDEV_INPUTS=${ENABLE_EVDEV_INPUTS}
      - FORCE_X11_DUMMY_CONFIG=${FORCE_X11_DUMMY_CONFIG}
      - HOST_DBUS=${HOST_DBUS}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES}
      - NVIDIA_DRIVER_VERSION=${NVIDIA_DRIVER_VERSION}
    devices:
      - ${FUSE_DEVICE_PATH}
      - ${UINPUT_DEVICE_PATH}
    device_cgroup_rules:
      - 'c 13:* rmw'
    volumes:
      - ${DBUS_PATH}:/run/dbus:ro
      - ${HOME_DIR}/:/home/default/:rw
      - ${GAMES_DIR}/:/mnt/games/:rw
      - ${SHARED_SOCKETS_DIR}/.X11-unix/:/tmp/.X11-unix/:rw
      - ${SHARED_SOCKETS_DIR}/pulse/:/tmp/pulse/:rw
  
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    user: 1014:100
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ${MOSQUITTO_CONFIG_PATH}:/mosquitto/config
      - ${MOSQUITTO_DATA_PATH}:/mosquitto/data
      - ${MOSQUITTO_LOG_PATH}:/mosquitto/log
    stop_signal: SIGTERM
    stop_grace_period: 20s

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - PUID=1002
      - PGID=100
      - TZ=Europe/Amsterdam
      - WEBUI_PORT=8080
    volumes:
      - ${QBITTORRENT_CONFIG_PATH}:/config
      - ${DOWNLOADS_PATH}:/downloads
    ports:
      - "10009:8080"
      - "6881:6881"
      - "6881:6881/udp"
    stop_signal: SIGTERM
    stop_grace_period: 30s

networks:
  proxy:
    name: proxy
  mariadb:
    name: mariadb
    driver: bridge

volumes: 
  open-webui:
  data:
  media:
  pgdata:
  redisdata:
