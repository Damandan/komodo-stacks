services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## scripts/docker/setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway
  
  open-webui: 
    image: ghcr.io/open-webui/open-webui:latest-cuda126
    container_name: open-webui 
    ports: 
      - "3000:8080" 
    volumes: 
      - open-webui:/app/backend/data 
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
          devices: 
            - capabilities: [gpu] 
    environment:
      - 'OLLAMA_BASE_URL=http://192.168.1.253:11434'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
  
  tvheadend:
    container_name: tvheadend
    image: linuxserver/tvheadend:latest
    restart: unless-stopped
    network_mode: host
    privileged: true
    runtime: nvidia
    environment:
      - PUID=1008
      - PGID=100
      - TZ=Europe/Amsterdam
    volumes:
      - "${TVHEADEND_RECORDINGS_PATH}:/recordings"
      - "${TVHEADEND_CONFIG_PATH}:/config"
      - ${PLEX_EPG_FILE_PATH}:/config/data/xmltv.xml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    stop_signal: SIGTERM
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  oscam:
    container_name: oscam
    image: linuxserver/oscam:latest
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - PUID=1010
      - PGID=100
      - TZ=Europe/Amsterdam
    ports:
      - "8888:8888"
      - "15050:15050"
      - "9090:9090"
    group_add:
      - dialout
    devices:
      - ${SMARGO_DEVICE_PATH}:/dev/ttyUSBSC
      - ${USB_BUS_PATH}:/dev/bus/usb
    volumes:
      - "${OSCAM_CONFIG_PATH}:/config"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M

  frigate:
    container_name: frigate
    image: ghcr.io/blakeblackshear/frigate:0.17.0
    restart: unless-stopped
    privileged: true
    shm_size: "1G"
    networks:
      - proxy
    devices:
      - ${USB_BUS_PATH}:/dev/bus/usb
    volumes:
      - ${LOCALTIME_PATH}:/etc/localtime:ro
      - ${FRIGATE_CONFIG_PATH}:/config
      - ${FRIGATE_MEDIA_PATH}:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    ports:
      - "10005:5000" # Internal unauthenticated access. Expose carefully.
      - "8554:8554" # RTSP feeds
      - "8555:8555/tcp" # WebRTC over tcp
      - "8555:8555/udp" # WebRTC over udp
      - "8971:8971"
      - "1984:1984"
    group_add:
      - "44"  # GID for video group
    device_cgroup_rules:
      - 'c 189:* rmw'
    environment:
      FRIGATE_MQTT_USER: ${FRIGATE_MQTT_USER}
      FRIGATE_MQTT_PASSWORD: ${FRIGATE_MQTT_PASSWORD}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    cap_add:
      - CAP_PERFMON
    deploy:
      resources:
        reservations:
          cpus: '4.0'
          memory: 3584M
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 5G
  
  traefik:
    image: traefik:v3.6.7
    container_name: traefik
    restart: always
    networks:
      - proxy
      - default
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DOCKER_SOCKET_PATH}:/var/run/docker.sock
      - ${TRAEFIK_STATIC_CONFIG_PATH}:/etc/traefik/traefik.yaml:ro
      - ${TRAEFIK_DYNAMIC_CONFIG_PATH}:/etc/traefik/dynamic.yaml:ro
      - ${TRAEFIK_ACME_PATH}:/letsencrypt/acme.json
      - ${TRAEFIK_TRANSIP_PATH}:/transip
    labels:
      - "traefik.enable=false"
    environment:
      - TRANSIP_ACCOUNT_NAME=${TRANSIP_ACCOUNT_NAME}
      - TRANSIP_PRIVATE_KEY_PATH=${TRANSIP_PRIVATE_KEY_PATH}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 64M

  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    depends_on:
      - db
    volumes:
      - ${HOMEASSISTANT_CONFIG_PATH}:/config
      - ${LOCALTIME_PATH}:/etc/localtime:ro
      - ${DBUS_PATH}:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    security_opt:
      - seccomp=unconfined
    network_mode: host
    environment:
      TZ: Europe/Amsterdam
    stop_signal: SIGTERM
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 3G
        reservations:
          memory: 720M

  matter-server:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: matter-server
    user: 1000:100
    restart: unless-stopped
    network_mode: host
    security_opt:
      - apparmor:unconfined
    volumes:
      - ${MATTER_SERVER_DATA_PATH}:/data/
      - ${DBUS_PATH}:/run/dbus:ro
    stop_signal: SIGTERM
    stop_grace_period: 30s

  modbus-proxy:
    image: tiagocoutinho/modbus-proxy
    container_name: modbus-proxy
    restart: always
    ports:
      - "5020:502"
    volumes:
      - ${MODBUS_PROXY_CONFIG_PATH}:/etc/modbus-proxy.yml
    stop_signal: SIGINT
    stop_grace_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M

  db:
    image: mariadb:latest
    container_name: mariadb
    user: "1001:100"
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - ${MARIADB_DATA_PATH}:/var/lib/mysql
      - ${MARIADB_CUSTOM_CNF_PATH}:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "3306:3306"
    networks:
      - mariadb
    security_opt:
      - seccomp=unconfined
    stop_signal: SIGTERM
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          cpus: '6.0'
          memory: 5G
        reservations:
          cpus: '3.0'
          memory: 2G

  adminer:
    image: adminer
    user: 1001:100
    container_name: adminer
    restart: "no"
    ports:
      - 8080:8080
    networks:
      - proxy
      - mariadb
    stop_signal: SIGTERM
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M

  spotweb:
    image: jgeusebroek/spotweb:dev
    container_name: spotweb
    depends_on:
      - db
    environment:
      - PUID=1009
      - PGID=100
      - TZ=Europe/Amsterdam
      - SPOTWEB_DB_TYPE=pdo_mysql
      - SPOTWEB_DB_HOST=${SPOTWEB_DB_HOST}
      - SPOTWEB_DB_PORT=${SPOTWEB_DB_PORT}
      - SPOTWEB_DB_NAME=${SPOTWEB_DB_NAME}
      - SPOTWEB_DB_USER=${SPOTWEB_DB_USER}
      - SPOTWEB_DB_PASS=${SPOTWEB_DB_PASS}
      - SPOTWEB_CRON_RETRIEVE=*/15 * * * *
      - SPOTWEB_CRON_CACHE_CHECK=10 */1 * * *
    ports:
      - 10006:80
    networks:
      - proxy
    volumes:
      - ${SPOTWEB_CONFIG_PATH}:/config
    tty: true
    stdin_open: true
    stop_signal: SIGTERM
    stop_grace_period: 1m
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  sonarr-danny:
    container_name: sonarr-danny
    image: ghcr.io/linuxserver/sonarr
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - sabnzbd-danny
    environment:
      - PUID=1005
      - PGID=100
      - TZ=Europe/Amsterdam
      - UMASK_SET=022
    volumes:
      - ${SONARR_CONFIG_PATH}:/config
      - ${DANNY_SERIES_PATH}:/tv
      - ${DANNY_DOWNLOADS_COMPLETED_PATH}:/downloads
    ports:
      - 10002:8989
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  bazarr-danny:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr-danny
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - radarr-danny
      - sonarr-danny
    environment:
      - PUID=1007
      - PGID=100
      - TZ=Etc/UTC
    volumes:
      - ${DANNY_BAZARR_CONFIG_PATH}:/config
      - ${DANNY_MOVIES_PATH}:/movies
      - ${DANNY_SERIES_PATH}:/tv
    ports:
      - 10003:6767
    stop_signal: SIGTERM
    stop_grace_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  radarr-danny:
    image: ghcr.io/linuxserver/radarr
    container_name: radarr-danny
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - sabnzbd-danny
    environment:
      - PUID=1004
      - PGID=100
      - TZ=Europe/Amsterdam
      - UMASK_SET=022
    volumes:
      - ${DANNY_RADARR_CONFIG_PATH}:/config
      - ${DANNY_MOVIES_PATH}:/movies
      - ${DANNY_DOWNLOADS_COMPLETED_PATH}:/downloads
    ports:
      - 10001:7878
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
  
  sabnzbd-danny:
    image: ghcr.io/linuxserver/sabnzbd
    container_name: sabnzbd-danny
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - PUID=1006
      - PGID=100
      - TZ=Europe/Amsterdam
    volumes:
      - ${DANNY_SABNZBD_CONFIG_PATH}:/config
      - ${DANNY_DOWNLOADS_COMPLETED_PATH}:/config/Downloads/complete
      - ${DANNY_DOWNLOADS_INCOMPLETE_PATH}:/config/Downloads/incomplete
    ports:
      - 10004:9090
    stop_signal: SIGTERM
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          memory: 256M
  
  bazarr-marlie:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr-marlie
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - radarr-marlie
    environment:
      - PUID=1007
      - PGID=100
      - TZ=Etc/UTC
    volumes:
      - ${MARLIE_BAZARR_CONFIG_PATH}:/config
      - ${MARLIE_MOVIES_PATH}:/movies
    ports:
      - 20003:6767
    stop_signal: SIGTERM
    stop_grace_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
  
  radarr-marlie:
    image: ghcr.io/linuxserver/radarr
    container_name: radarr-marlie
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - sabnzbd-danny
    environment:
      - PUID=1004
      - PGID=100
      - TZ=Europe/Amsterdam
      - UMASK_SET=022
    volumes:
      - ${MARLIE_RADARR_CONFIG_PATH}:/config
      - ${MARLIE_MOVIES_PATH}:/movies
      - ${MARLIE_DOWNLOADS_COMPLETED_PATH}:/downloads
    ports:
      - 20001:7878
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
  
  sabnzbd-marlie:
    image: ghcr.io/linuxserver/sabnzbd
    container_name: sabnzbd-marlie
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - PUID=1006
      - PGID=100
      - TZ=Europe/Amsterdam
    volumes:
      - ${MARLIE_SABNZBD_CONFIG_PATH}:/config
      - ${MARLIE_DOWNLOADS_COMPLETED_PATH}:/config/Downloads/complete
      - ${MARLIE_DOWNLOADS_INCOMPLETE_PATH}:/config/Downloads/incomplete
    ports:
      - 20004:9090
    stop_signal: SIGTERM
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          memory: 256M
  
  #plex:
  #  image: plexinc/pms-docker:plexpass
  #  container_name: plex
  #  restart: unless-stopped
  #  network_mode: host
  #  runtime: nvidia
  #  env_file: .env
  #  environment:
  #    - PLEX_UID=1003
