version: "3.9"

services:
  tvheadend:
    container_name: tvheadend
    image: linuxserver/tvheadend:latest
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      - PUID=1008
      - PGID=100
      - TZ=Europe/Amsterdam
    volumes:
      - "${TVHEADEND_RECORDINGS_PATH}:/recordings"
      - "${TVHEADEND_CONFIG_PATH}:/config"
    stop_signal: SIGTERM
    stop_grace_period: 45s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  oscam:
    container_name: oscam
    image: linuxserver/oscam:latest
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - PUID=1010
      - PGID=100
      - TZ=Europe/Amsterdam
    ports:
      - "8888:8888"
      - "15050:15050"
      - "9090:9090"
    group_add:
      - dialout
    devices:
      - ${SMARGO_DEVICE_PATH}:/dev/ttyUSBSC
      - ${USB_BUS_PATH}:/dev/bus/usb
    volumes:
      - "${OSCAM_CONFIG_PATH}:/config"
    stop_signal: SIGTERM
    stop_grace_period: 30s

  frigate:
    container_name: frigate
    image: ghcr.io/blakeblackshear/frigate:0.17.0
    restart: unless-stopped
    privileged: true
    shm_size: "1G"
    networks:
      - proxy
    devices:
      - ${USB_BUS_PATH}:/dev/bus/usb
    volumes:
      - ${LOCALTIME_PATH}:/etc/localtime:ro
      - ${FRIGATE_CONFIG_PATH}:/config
      - ${FRIGATE_MEDIA_PATH}:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    ports:
      - "10005:5000"
      - "8554:855
  
  traefik:
    image: traefik:v3.6.7
    container_name: traefik
    restart: always
    networks:
      - proxy
      - default
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DOCKER_SOCKET_PATH}:/var/run/docker.sock
      - ${TRAEFIK_STATIC_CONFIG_PATH}:/etc/traefik/traefik.yaml:ro
      - ${TRAEFIK_DYNAMIC_CONFIG_PATH}:/etc/traefik/dynamic.yaml:ro
      - ${TRAEFIK_ACME_PATH}:/letsencrypt/acme.json
      - ${TRAEFIK_TRANSIP_PATH}:/transip
    labels:
      - "traefik.enable=true"
    environment:
      - TRANSIP_ACCOUNT_NAME=${TRANSIP_ACCOUNT_NAME}
      - TRANSIP_PRIVATE_KEY_PATH=${TRANSIP_PRIVATE_KEY_PATH}
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 64M

  whoami:
    image: traefik/whoami
    container_name: whoami
    restart: unless-stopped
    networks:
      - proxy
      - default

  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    depends_on:
      - db
    volumes:
      - ${HOMEASSISTANT_CONFIG_PATH}:/config
      - ${LOCALTIME_PATH}:/etc/localtime:ro
      - ${DBUS_PATH}:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    security_opt:
      - seccomp=unconfined
    network_mode: host
    environment:
      TZ: Europe/Amsterdam
    stop_signal: SIGTERM
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 3G
        reservations:
          memory: 720M

  matter-server:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: matter-server
    restart: unless-stopped
    network_mode: host
    security_opt:
      - apparmor:unconfined
    volumes:
      - ${MATTER_SERVER_DATA_PATH}:/data/
      - ${DBUS_PATH}:/run/dbus:ro
    stop_signal: SIGTERM
    stop_grace_period: 30s

  modbus-proxy:
    image: tiagocoutinho/modbus-proxy
    container_name: modbus-proxy
    restart: always
    ports:
      - "5020:502"
    volumes:
      - ${MODBUS_PROXY_CONFIG_PATH}:/etc/modbus-proxy.yml
    stop_signal: SIGINT
    stop_grace_period: 20s

  db:
    image: mariadb:latest
    container_name: mariadb
    user: "1001:100"
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - ${MARIADB_DATA_PATH}:/var/lib/mysql
      - ${MARIADB_CUSTOM_CNF_PATH}:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "3306:3306"
    networks:
      - mariadb
    security_opt:
      - seccomp=unconfined
    stop_signal: SIGTERM
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          cpus: '6.0'
          memory: 5G
        reservations:
          memory: 2G

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - 8080:8080
    networks:
      - proxy
      - mariadb
    stop_signal: SIGTERM
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  spotweb:
    image: jgeusebroek/spotweb:dev
    container_name: spotweb
    depends_on:
      - db
    environment:
      - PUID=1009
      - PGID=100
      - TZ=Europe/Amsterdam
      - SPOTWEB_DB_TYPE=pdo_mysql
      - SPOTWEB_DB_HOST=${SPOTWEB_DB_HOST}
      - SPOTWEB_DB_PORT=${SPOTWEB_DB_PORT}
      - SPOTWEB_DB_NAME=${SPOTWEB_DB_NAME}
      - SPOTWEB_DB_USER=${SPOTWEB_DB_USER}
      - SPOTWEB_DB_PASS=${SPOTWEB_DB_PASS}
      - SPOTWEB_CRON_RETRIEVE=*/15 * * * *
      - SPOTWEB_CRON_CACHE_CHECK=10 */1 * * *
    ports:
      - 10006:80
    networks:
      - proxy
    volumes:
      - ${SPOTWEB_CONFIG_PATH}:/config
    tty: true
    stdin_open: true
    stop_signal: SIGTERM
    stop_grace_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 100M
        reservations:
          memory: 20M
    sonarr-danny:
    container_name: sonarr-danny
    image: ghcr.io/linuxserver/sonarr
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - sabnzbd-danny
    environment:
      - PUID=1005
      - PGID=100
      - TZ=Europe/Amsterdam
      - UMASK_SET=022
    volumes:
      - ${SONARR_CONFIG_PATH}:/config
      - ${DANNY_SERIES_PATH}:/tv
      - ${DANNY_DOWNLOADS_COMPLETED_PATH}:/downloads
    ports:
      - 10002:8989
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  bazarr-danny:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr-danny
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - radarr-danny
      - sonarr-danny
    environment:
      - PUID=1007
      - PGID=100
      - TZ=Etc/UTC
    volumes:
      - ${DANNY_BAZARR_CONFIG_PATH}:/config:rw
      - ${DANNY_MOVIES_PATH}:/movies:rw
      - ${DANNY_SERIES_PATH}:/tv:rw
    ports:
      - 10003:6767
    stop_signal: SIGTERM
    stop_grace_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  radarr-danny:
    image: ghcr.io/linuxserver/radarr
    container_name: radarr-danny
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - sabnzbd-danny
    environment:
      - PUID=1004
      - PGID=100
      - TZ=Europe/Amsterdam
      - UMASK_SET=022
    volumes:
      - ${DANNY_RADARR_CONFIG_PATH}:/config
      - ${DANNY_MOVIES_PATH}:/movies
      - ${DANNY_DOWNLOADS_COMPLETED_PATH}:/downloads
    ports:
      - 10001:7878
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  sabnzbd-danny:
    image: ghcr.io/linuxserver/sabnzbd
    container_name: sabnzbd-danny
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - PUID=1006
      - PGID=100
      - TZ=Europe/Amsterdam
    volumes:
      - ${DANNY_SABNZBD_CONFIG_PATH}:/config
      - ${DANNY_DOWNLOADS_COMPLETED_PATH}:/config/Downloads/complete
      - ${DANNY_DOWNLOADS_INCOMPLETE_PATH}:/config/Downloads/incomplete
    ports:
      - 10004:9090
    stop_signal: SIGTERM
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          memory: 256M
    bazarr-marlie:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr-marlie
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - radarr-marlie
    environment:
      - PUID=1007
      - PGID=100
      - TZ=Etc/UTC
    volumes:
      - ${MARLIE_BAZARR_CONFIG_PATH}:/config
      - ${MARLIE_MOVIES_PATH}:/movies
    ports:
      - 20003:6767
    stop_signal: SIGTERM
    stop_grace_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  radarr-marlie:
    image: ghcr.io/linuxserver/radarr
    container_name: radarr-marlie
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - sabnzbd-marlie
    environment:
      - PUID=1004
      - PGID=100
      - TZ=Europe/Amsterdam
      - UMASK_SET=022
    volumes:
      - ${MARLIE_RADARR_CONFIG_PATH}:/config
      - ${MARLIE_MOVIES_PATH}:/movies
      - ${MARLIE_DOWNLOADS_PATH}:/downloads
    ports:
      - 20001:7878
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  sabnzbd-marlie:
    image: ghcr.io/linuxserver/sabnzbd
    container_name: sabnzbd-marlie
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - PUID=1006
      - PGID=100
      - TZ=Europe/Amsterdam
    volumes:
      - ${MARLIE_SABNZBD_CONFIG_PATH}:/config
      - ${MARLIE_DOWNLOADS_COMPLETED_PATH}:/config/Downloads/complete
      - ${MARLIE_DOWNLOADS_INCOMPLETE_PATH}:/config/Downloads/incomplete
    ports:
      - 20004:9090
    stop_signal: SIGTERM
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          memory: 256M
    plex:
    image: plexinc/pms-docker:plexpass
    container_name: plex
    restart: unless-stopped
    network_mode: host
    runtime: nvidia
    env_file: .env
    environment:
      - PLEX_UID=1003
      - PLEX_GID=100
      - TZ=Europe/Amsterdam
      - PLEX_CLAIM=${PLEX_CLAIM}
      - ADVERTISE_IP=${ADVERTISE_IP}
      - HOSTNAME=${PLEX_HOSTNAME}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    stop_signal: SIGTERM
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 1G
        reservations:
          memory: 128M
    volumes:
      - ${PLEX_CONFIG_PATH}:/config
      - ${PLEX_MULTIMEDIA_PATH}:/multimedia
      - ${PLEX_EPG_FILE_PATH}:/ziggogo.xml
      - ${PLEX_TRANSCODE_PATH}:/transcode
      - ${DANNY_SERIES_PATH}:/tv
      - ${DANNY_MOVIES_PATH}:/movies
      - ${DANNY_MOVIES_2_PATH}:/movies2
      - ${MUSIC_PATH}:/music

  steam-headless:
    image: josh5/steam-headless
    container_name: steam-headless
    restart: unless-stopped
    privileged: true
    shm_size: ${SHM_SIZE}
    ipc: host
    network_mode: host
    hostname: ${STEAM_HOSTNAME}
    extra_hosts:
      - "${STEAM_HOSTNAME}:127.0.0.1"
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_NICE
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    runtime: nvidia
    environment:
      - TZ=${TZ}
      - USER_LOCALES=${USER_LOCALES}
      - DISPLAY=${DISPLAY}
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - USER_PASSWORD=${USER_PASSWORD}
      - MODE=${MODE}
      - WEB_UI_MODE=${WEB_UI_MODE}
      - ENABLE_VNC_AUDIO=${ENABLE_VNC_AUDIO}
      - PORT_NOVNC_WEB=${PORT_NOVNC_WEB}
      - NEKO_NAT1TO1=${NEKO_NAT1TO1}
      - ENABLE_STEAM=${ENABLE_STEAM}
      - STEAM_ARGS=${STEAM_ARGS}
      - ENABLE_SUNSHINE=${ENABLE_SUNSHINE}
      - SUNSHINE_USER=${SUNSHINE_USER}
      - SUNSHINE_PASS=${SUNSHINE_PASS}
      - ENABLE_EVDEV_INPUTS=${ENABLE_EVDEV_INPUTS}
      - FORCE_X11_DUMMY_CONFIG=${FORCE_X11_DUMMY_CONFIG}
      - HOST_DBUS=${HOST_DBUS}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES}
      - NVIDIA_DRIVER_VERSION=${NVIDIA_DRIVER_VERSION}
    devices:
      - ${FUSE_DEVICE_PATH}
      - ${UINPUT_DEVICE_PATH}
    device_cgroup_rules:
      - 'c 13:* rmw'
    volumes:
      - ${DBUS_PATH}:/run/dbus:ro
      - ${HOME_DIR}/:/home/default/:rw
      - ${GAMES_DIR}/:/mnt/games/:rw
      - ${SHARED_SOCKETS_DIR}/.X11-unix/:/tmp/.X11-unix/:rw
      - ${SHARED_SOCKETS_DIR}/pulse/:/tmp/pulse/:rw
    mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ${MOSQUITTO_CONFIG_PATH}:/mosquitto/config
      - ${MOSQUITTO_DATA_PATH}:/mosquitto/data
      - ${MOSQUITTO_LOG_PATH}:/mosquitto/log
    stop_signal: SIGTERM
    stop_grace_period: 20s

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - PUID=1002
      - PGID=100
      - TZ=Europe/Amsterdam
      - WEBUI_PORT=8080
    volumes:
      - ${QBITTORRENT_CONFIG_PATH}:/config
      - ${DOWNLOADS_PATH}:/downloads
    ports:
      - "10007:8080"
      - "6881:6881"
      - "6881:6881/udp"
    stop_signal: SIGTERM
    stop_grace_period: 30s

  authentik:
    image: ghcr.io/goauthentik/server:latest
    container_name: authentik
    restart: unless-stopped
    networks:
      - proxy
      - authentik
    depends_on:
      - authentik-postgres
      - authentik-redis
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED}
      AUTHENTIK_EMAIL__HOST: ${AUTHENTIK_EMAIL__HOST}
      AUTHENTIK_EMAIL__PORT: ${AUTHENTIK_EMAIL__PORT}
      AUTHENTIK_EMAIL__USERNAME: ${AUTHENTIK_EMAIL__USERNAME}
      AUTHENTIK_EMAIL__PASSWORD: ${AUTHENTIK_EMAIL__PASSWORD}
      AUTHENTIK_EMAIL__USE_TLS: ${AUTHENTIK_EMAIL__USE_TLS}
      AUTHENTIK_EMAIL__USE_SSL: ${AUTHENTIK_EMAIL__USE_SSL}
      AUTHENTIK_EMAIL__TIMEOUT: ${AUTHENTIK_EMAIL__TIMEOUT}
      AUTHENTIK_ENABLE_STACKTRACES: ${AUTHENTIK_ENABLE_STACKTRACES}
      AUTHENTIK_TEMPLATES__DIR: /templates
      AUTHENTIK_MEDIA__ROOT: /media
      AUTHENTIK_CERTS__DIR: /certs
      PG_HOST: authentik-postgres
      PG_PORT: 5432
      PG_NAME: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASS: ${PG_PASS}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER}
    volumes:
      - ${AUTHENTIK_TEMPLATES_PATH}:/templates
      - ${AUTHENTIK_MEDIA_PATH}:/media
      - ${AUTHENTIK_CERTS_PATH}:/certs
    ports:
      - "10008:9000"
    stop_signal: SIGTERM
    stop_grace_period: 45s

  authentik-worker:
    image: ghcr.io/goauthentik/server:latest
    container_name: authentik-worker
    restart: unless-stopped
    networks:
      - authentik
    depends_on:
      - authentik-postgres
      - authentik-redis
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      PG_HOST: authentik-postgres
      PG_PORT: 5432
      PG_NAME: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASS: ${PG_PASS}
    volumes:
      - ${AUTHENTIK_TEMPLATES_PATH}:/templates
      - ${AUTHENTIK_MEDIA_PATH}:/media
      - ${AUTHENTIK_CERTS_PATH}:/certs
      - /var/run/docker.sock:/var/run/docker.sock
    command: worker
    stop_signal: SIGTERM
    stop_grace_period: 45s

  authentik-redis:
    image: redis:alpine
    container_name: authentik-redis
    restart: unless-stopped
    networks:
      - authentik
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    stop_signal: SIGTERM
    stop_grace_period: 20s

  authentik-postgres:
    image: postgres:15
    container_name: authentik-postgres
    restart: unless-stopped
    networks:
      - authentik
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASS}
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
    stop_signal: SIGTERM
    stop_grace_period: 45s
  
  ziggo-epg-generator:
    container_name: ziggo-epg-generator
    image: ghcr.io/damandan/ziggo-epg-generator:latest
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - ${PLEX_EPG_FILE_PATH}:/app/ziggogo.xml
    stop_signal: SIGTERM
    stop_grace_period: 20s

networks:
  proxy:
    external: true
  mariadb:
    external: true
  authentik:
    external: true

volumes: {}