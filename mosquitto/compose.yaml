services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    ports:
      - 1883:1883
      - 8883:8883
      - 9001:9001 # some images use this port, check and change the host port accordingly
    stop_signal: SIGTERM  # or SIGINT
    stop_grace_period: 30s  # or other duration
    deploy:
      resources:
        limits:
          memory: 32M
        reservations:
          memory: 16M
    volumes:
      - ${MOSQUITTO_CONFIG_PATH}:/mosquitto/config # you've to create a conf file, see below for sample
      - ${MOSQUITTO_DATA_PATH}:/mosquitto/data
      - ${MOSQUITTO_LOG_PATH}:/mosquitto/log
    restart: always
    networks:
      - mosquitto

networks:
  mosquitto:
    name: mosquitto
    driver: bridge
