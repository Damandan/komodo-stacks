services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    deploy: 
      resources: 
        reservations: 
          devices: 
            - capabilities: [gpu]
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_DATA_DIR}:/root/.ollama

  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - ${OPENWEBUI_DATA_DIR}:/app/backend/data

networks:
  default:
    external: true
    name: bridge

